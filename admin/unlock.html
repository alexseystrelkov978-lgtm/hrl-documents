<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0;url=../index.html">
<title>Перенаправление…</title>
<script>
  const p = new URLSearchParams(location.search);
  const n = p.get('next');
  if (n) {
    location.replace(n.startsWith('admin/') ? '../' + n : (n.startsWith('../') ? n : '../' + n));
  } else {
    location.replace('../index.html');
  }
</script>
</head>
<body><p><a href="../index.html">На главную</a></p></body>
</html>
